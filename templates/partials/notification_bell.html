<div class="notification-badge me-3">
    <button class="btn btn-light" onclick="toggleNotifications()">
        <i class="fas fa-bell"></i>
        <span class="badge bg-danger" id="notificationCount">0</span>
    </button>
    <div class="notification-dropdown" id="notificationDropdown">
        <h6 class="p-3">🔔 Notifications</h6>
        <div id="notificationList"><div class="text-center text-muted p-4">No new notifications</div></div>
        <div class="p-2 border-top text-center">
            <button class="btn btn-sm btn-link" onclick="markAllRead()">Mark all as read</button>
        </div>
    </div>
</div>
